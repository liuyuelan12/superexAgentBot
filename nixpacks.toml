[phases.setup]
nixPkgs = ["python313", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
]

[start]
cmd = "/opt/venv/bin/python main.py"

[variables]
PYTHONUNBUFFERED = "1"
HF_HOME = "/app/.cache/huggingface"
